<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mina:wght@400;700&family=Poppins&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/popup/css/popup_main.css">
    <title>Form Filler</title>
</head>
<body>
    <header>
        <h2>Auto Fill Form</h2>
        <h4>A simple form filler because I'm lazy</h4>
    </header>

    <div class="file_upload_container" id="file-upload-btn">
        <img src="" alt="">
        <label for="">Upload .xlxs / .csv</label>
        <input type="file" id="file-upload" accept=".xlsx, .csv" style="display: none;">
    </div>

    <div class="ID_map_container" id="ID_map_container" style="display: none;">
        <div style="display: flex;">
            <input type="text" placeholder="Enter ID">
            <img src="" alt="trash">
        </div>
    </div>

    <div class="bottom_container">
        <section style="display: none;">
            <div class="btn_lineoption" id="btn_lineBack">Back</div>
            <div class="btn_lineoption" id="btn_lineForward">Next</div>
        </section>
        <section class="btn_lineoption reset" id="btn_lineReset">
            <p>Reset</p>
        </section>
        <section class="btn_lineoption" id="btn_lineStart">
            <p>Start</p>
        </section>
    </div>

    <script src="popup.js"></script>
</body>
</html>
